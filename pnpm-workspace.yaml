packages:
  - packages/*
  - examples/*
  # mono-app is a self-contained nested pnpm workspace (monorepo fixture);
  # install it separately: cd examples/mono-app && pnpm install
  - "!examples/mono-app"
  - docs-site
  # Eval harnesses — private, never published (context-architecture baseline).
  - evals/*
onlyBuiltDependencies:
  - esbuild
