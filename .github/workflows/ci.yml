name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm --filter '@designbookapp/designbook' check-types

      - name: Test
        run: pnpm --filter '@designbookapp/designbook' test:run

      - name: Build
        run: pnpm --filter '@designbookapp/designbook' build

      - name: Lint layers
        run: pnpm --filter '@designbookapp/designbook' lint:layers
