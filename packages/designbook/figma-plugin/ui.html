<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        margin: 0;
        padding: 16px;
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        font-size: 12px;
        color: #333;
      }
      #status {
        line-height: 1.4;
      }
      .dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #999;
        margin-right: 6px;
      }
      .dot.connected {
        background: #14ae5c;
      }
      .dot.searching {
        background: #f2994a;
      }
    </style>
  </head>
  <body>
    <div id="status"><span class="dot" id="dot"></span><span id="statusText">Loading…</span></div>
    <!-- build:figma-plugin inlines the bundled ui.ts script here -->
  </body>
</html>
